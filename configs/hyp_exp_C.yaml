# Experimento C (Fase 3): pesos de clase y/o oversampling para clases
# minoritarias (head_without_helmet, no_vest_person).
#
# Nota: Ultralytics no expone pesos de clase como un hiperparámetro YAML
# nativo, así que la implementación práctica de este experimento ocurre
# en el notebook 04_exp_C_class_weights.ipynb (oversampling vía manifiesto
# extendido en data.yaml o ajuste de pesos manual en cls loss).
# Este archivo deja los hiperparámetros restantes idénticos al baseline.

model: yolov8s.pt
epochs: 80
imgsz: 640
batch: 16
patience: 20
optimizer: SGD
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

box: 7.5
cls: 0.5                 # ajustar al alza en el notebook si pesos se aplican manualmente
dfl: 1.5

hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
copy_paste: 0.0
erasing: 0.0
close_mosaic: 0
