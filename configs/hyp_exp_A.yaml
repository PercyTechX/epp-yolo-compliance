# Experimento A (Fase 3): subir resolución a 960 manteniendo el resto del
# baseline. Objetivo: mejorar detección de objetos pequeños.
#
# Tomar como base hyp_baseline.yaml y sobrescribir lo necesario en el
# notebook 02_exp_A_resolution.ipynb.

model: yolov8s.pt
epochs: 80
imgsz: 960
batch: 8                # bajar batch porque crece la VRAM con imgsz=960
patience: 20
optimizer: SGD
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

box: 7.5
cls: 0.5
dfl: 1.5

# Augmentaciones idénticas al baseline para aislar el efecto de imgsz.
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
copy_paste: 0.0
erasing: 0.0
close_mosaic: 0
